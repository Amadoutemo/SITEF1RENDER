<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta nom="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparateur de pilotes de F1 2026</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        header { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://f1i.autojournal.fr/wp-content/uploads/sites/17/2022/07/f1-technique-circuit-front-rear-limite-avant-arriere_3.jpg'); 
            background-size: cover; 
            background-position: center;
            color: white; 
            padding: 40px; 
            text-align: center; 
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .selectors-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; }
        .vs-badge { font-weight: bold; font-size: 24px; color: #e10600; }
        .comparison-grid { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .driver-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; transition: 0.3s; }
        .image-wrapper img { width: 100%; height: 250px; object-fit: cover; background: #eee; }
        .content { padding: 20px; }
        .stats { list-style: none; padding: 0; }
        .stats li { margin-bottom: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 220px; }
    </style>
</head>

<html>
<head></head>
    <body>
            <h1>Nom du fanatique du F1</h1>
                <p>
                    <span id="Prénom">
            </span>
        </p>
    </body>
</html>


<body>

    <header>
        <h1>Le meilleur comparateur de pilote de l'histoire</h1>
        <p>Saison 2026 : La nouvelle ère</p>
    </header>
 
    <section class="selectors-container">
        <div class="select-box">
            <label>Pilote n°1</label><br>
            <select id="select-p1" onchange="updateDriver(1)">
                <option value="sainz" selected>Carlos Sainz (Williams)</option>
                <option value="verstappen">Max Verstappen (Red Bull)</option>
                <option value="hadjar">Isack Hadjar (Red Bull)</option>
                <option value="hamilton">Lewis Hamilton (Ferrari)</option>
                <option value="leclerc">Charles Leclerc (Ferrari)</option>
                </select>
        </div>

        <div class="vs-badge">VS</div>

        <div class="select-box">
            <label>Pilote n°2</label><br>
            <select id="select-p2" onchange="updateDriver(2)">
                <option value="verstappen" selected>Max Verstappen (Red Bull)</option>
                <option value="sainz">Carlos Sainz (Williams)</option>
                <option value="hadjar">Isack Hadjar (Red Bull)</option>
                <option value="hamilton">Lewis Hamilton (Ferrari)</option>
                <option value="leclerc">Charles Leclerc (Ferrari)</option>
            </select>
        </div>
    </section>

    <main class="comparison-grid">
    <article class="driver-card" id="card-1">
        <div class="image-wrapper">
            <img id="img-1" src="" alt="Pilote 1">
        </div>
        <div class="content">
            <h2 id="nom-1"></h2>
            <p id="bio-1" class="bio"></p>
            <ul class="stats">
                <li><span>Écurie :</span> <strong id="equipe-1"></strong></li>
                <li><span>Titres :</span> <strong id="titres-1"></strong></li>
                <li><span>Podiums :</span> <strong id="podiums-1"></strong></li>
                <li><span>Victoires :</span> <strong id="victoires-1"></strong></li>
            </ul>
        </div>
    </article>

    <article class="driver-card" id="card-2">
        <div class="image-wrapper">
            <img id="img-2" src="" alt="Pilote 2">
        </div>
        <div class="content">
            <h2 id="nom-2"></h2>
            <p id="bio-2" class="bio"></p>
            <ul class="stats">
                <li><span>Écurie :</span> <strong id="equipe-2"></strong></li>
                <li><span>Titres :</span> <strong id="titres-2"></strong></li>
                <li><span>Podiums :</span> <strong id="podiums-2"></strong></li>
                <li><span>Victoires :</span> <strong id="victoires-2"></strong></li>
            </ul>
        </div>
    </article>
</main>

    <script>
        const driversData = {
            sainz: {
                nom: "Carlos Sainz",
                equipe: "Williams",
                titres: "0",
                podiums: "29",
                victoires: "4",
                bio: "Le 'Smooth Operator' mène le projet Williams-Mercedes.",
                img: "https://cdn-1.motorsport.com/images/mgl/2jXPqrg6/s800/carlos-sainz-williams.webp"
            },
            verstappen: {
                nom: "Max Verstappen",
                equipe: "Red Bull Racing",
                titres: "4",
                podiums: "127",
                victoires: "71",
                bio: "Le champion sortant, fer de lance de l'écurie Red Bull.",
                img: "https://cdn-7.motorsport.com/images/mgl/YvKQLrx6/s8/max-verstappen-red-bull-racing.jpg"
            },
            hadjar: {
                nom: "Isack Hadjar",
                equipe: "Red Bull Racing",
                titres: "0",
                podiums: "0",
                victoires: "0",
                bio: "Le jeune espoir français fait ses débuts dans l'écurie mère.",
                img: "https://ratings-images-prod.pulse.ea.com/F1-25/portraits/p20.png?im=FaceCrop,algorithm=dnn,padding=0.7,width=256,height=256"
            },
            hamilton: {
                nom: "Lewis Hamilton",
                equipe: "Ferrari",
                titres: "7",
                podiums: "203",
                victoires: "105",
                bio: "Le septuple champion entame sa 2ème saison chez les Rouges.",
                img: "https://cdn-2.motorsport.com/images/mgl/0rVxlq50/s800/lewis-hamilton-ferrari-2.webp"
            },
            leclerc : {
                nom: "Charles Leclerc",
                equipe: "Ferrari",
                titres: "0",
                podiums: "52",
                victoires: "8",
                bio: "Le 'Petit Prince' de Monaco et pur talent de la Scuderia.",
                img: "https://cdn-9.motorsport.com/images/mgl/6grBRd7Y/s8/charles-leclerc-ferrari.jpg"
            }
        };

        function updateDriver(cardNumber) {
            const selectId = "select-p" + cardNumber;
            const selectedDriver = document.getElementById(selectId).value;
            const data = driversData[selectedDriver];

            if (data) {
                document.getElementById("nom-" + cardNumber).innerText = data.nom;
                document.getElementById("equipe-" + cardNumber).innerText = data.equipe;
                document.getElementById("titres-" + cardNumber).innerText = data.titres;
                document.getElementById("podiums-" + cardNumber).innerText = data.podiums
                document.getElementById("victoires-" + cardNumber).innerText = data.victoires;
                document.getElementById("bio-" + cardNumber).innerText = data.bio;
                document.getElementById("img-" + cardNumber).src = data.img;
            }
        }
        window.onload = function() {
    updateDriver(1);
    updateDriver(2);
};
    </script>

</body>
</html>
